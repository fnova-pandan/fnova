<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>FNovaa CV</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <h1>FNovaa CV ✨</h1>

    <div class="subtitle">
        <span>USDT</span>
        <span class="arrow">→</span>
        <span>IDR</span>
    </div>

    <div class="card">

        <label>Pilih Exchange</label>
        <select id="exchange">
            <option value="">-- Pilih --</option>
            <option value="binance">BINANCE</option>
            <option value="okx">OKX</option>
            <option value="gate">GATE IO</option>
        </select>

        <label>Nominal (<span class="usdt">USDT</span>)</label>
        <input type="number" id="usdt" placeholder="Contoh: 25">

        <div class="result">
            <p>IDR Kotor: <span id="idr" class="kotor">0</span></p>
            <p>Fee: <span id="tax">0</span></p>
            <p class="net">IDR Bersih: <span id="net">0</span></p>
        </div>

        <div id="account"></div>

        <button id="order">Saya Sudah Transfer</button>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
