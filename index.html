<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEST FNOVAA</title>
</head>

<body>

<h3>Test Convert</h3>

<select id="exchange">
<option value="">-- Pilih --</option>
<option value="BINANCE">BINANCE</option>
<option value="OKX">OKX</option>
</select>

<br><br>

<input id="usdt" placeholder="ketik angka">

<p id="hasil">Rp 0</p>
<p id="uid">UID: -</p>

<script>
window.onload = function(){

console.log("JS HIDUP");

// DATA
const rate = 16500;
const accounts = {
  BINANCE: "1179095398",
  OKX: "775966960717997987"
};

// ELEMENT
const usdt = document.getElementById("usdt");
const hasil = document.getElementById("hasil");
const uid = document.getElementById("uid");
const exchange = document.getElementById("exchange");

// INPUT TEST
usdt.addEventListener("input", function(){
  let val = parseFloat(this.value);
  if(!val){
    hasil.innerText = "Rp 0";
    return;
  }
  hasil.innerText = "Rp " + (val * rate);
});

// EXCHANGE TEST
exchange.addEventListener("change", function(){
  uid.innerText = "UID: " + (accounts[this.value] || "-");
});

}
</script>

</body>
</html>
