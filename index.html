<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FNovaa CV</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="bg"></div>

<div class="app">
    <div class="logo">
        🌌 <span>FNovaa CV</span>
    </div>

    <div class="pair">
        <span class="usdt">USDT</span> → <span class="idr">IDR</span>
    </div>

    <div class="card">

        <label>Pilih Exchange</label>
        <select id="exchange">
            <option value="">-- Pilih --</option>
            <option value="binance">BINANCE</option>
            <option value="okx">OKX</option>
            <option value="gate">GATE IO</option>
        </select>

        <label>Nominal (<span class="usdt">USDT</span>)</label>
        <input type="number" id="usdt" placeholder="Contoh: 25">

        <div class="result red">IDR Kotor: <span id="kotor">0</span></div>
        <div class="result">Fee: <span id="fee">0</span></div>
        <div class="result green">IDR Bersih: <span id="bersih">0</span></div>

        <div class="box">
            <div>UID: <span id="uid">-</span></div>
            <div>USN: <span id="usn">-</span></div>
        </div>

        <button id="btn">Saya Sudah Transfer</button>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
