<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FNOVAA CV</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>✨ FNOVAA Convert</h1>

    <label>Pilih Exchange</label>
    <select id="exchange">
        <option value="">-- Pilih --</option>
        <option>BINANCE</option>
        <option>OKX</option>
        <option>GATE IO</option>
    </select>

    <label>Nominal (USDT)</label>
    <input type="number" id="usdt" placeholder="Contoh: 7">

    <div class="result">

        <p class="title">Hasil Convert (Rp)</p>
        <h2>Rp <span id="bersih">0</span></h2>

        <p class="detail">
        Total = <span id="usdtText">0</span> USDT × 16.500  
        - Fee (Rp <span id="fee">0</span>)
        </p>

        <div class="account">
            <p>UID:</p>
            <b id="uid">-</b>
            <p>USN:</p>
            <b id="usn">-</b>
        </div>

    </div>

    <button id="btn">Saya Sudah Transfer</button>

</div>

<script src="script.js"></script>
</body>
</html>
