<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fnovaa CV</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

<div class="title">Fnovaa CV</div>

<div class="field">
<label>Pilih Exchange</label>
<select id="exchange">
<option value="">-- Pilih --</option>
<option value="BINANCE">🔶 BINANCE</option>
<option value="OKX">🔷 OKX</option>
<option value="GATE IO">🔵 GATE IO</option>
<option value="TOKOCRYPTO">🟢 TOKOCRYPTO</option>
<option value="MEXC">💠 MEXC</option>
<option value="BYBIT">🟡 BYBIT</option>
<option value="BITGET">⚫ BITGET</option>
</select>
</div>

<div class="field">
<label>Nominal (USDT)</label>
<input type="text" inputmode="numeric" id="usdt" placeholder="Masukkan USDT">
</div>

<div class="result">
<h2 id="hasil">Rp 0</h2>
<div>Fee: Rp <span id="fee">0</span></div>
<div>Silakan kirim <b><span id="kirim">0</span> USDT</b></div>
</div>

<div class="uidbox">
UID: <span id="uid">-</span><br>
USN: FNOVA
</div>

<button id="btn">Saya Sudah Transfer</button>

<script src="script.js"></script>
</body>
</html>
