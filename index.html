<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fn Corneas CV</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

<style>
*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Poppins',sans-serif;
}

body{
background: radial-gradient(circle at top,#1e1b4b,#020617);
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:flex-start;
padding:20px;
overflow-x:hidden;
}

.wrapper{
width:100%;
max-width:360px;
}

.card{
width:100%;
background: rgba(30,41,59,0.65);
backdrop-filter: blur(12px);
border-radius:20px;
padding:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.title{
text-align:center;
font-size:22px;
font-weight:600;
color:#60a5fa;
margin-bottom:16px;
}

.field{
margin-bottom:12px;
}

label{
font-size:12px;
opacity:.7;
margin-bottom:4px;
display:block;
}

select,input{
width:100%;
height:44px;
padding:0 12px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.15);
background: rgba(51,65,85,0.6);
color:white;
font-size:14px;
outline:none;
}

.result{
background: rgba(2,6,23,0.85);
padding:14px;
border-radius:12px;
text-align:center;
margin-bottom:12px;
}

.result h2{
color:#22c55e;
font-size:22px;
margin-bottom:6px;
}

.desc1{font-size:12px;opacity:.7;}
.desc2{font-size:13px;margin-top:6px;}
.desc3{font-size:11px;opacity:.6;margin-top:8px;line-height:1.4;}

.usdt{color:#22c55e;font-weight:600;}

.uidbox{
background: rgba(2,6,23,0.9);
padding:12px;
border-radius:12px;
text-align:center;
margin-bottom:12px;
font-size:13px;
}

button{
width:100%;
height:44px;
border-radius:12px;
border:none;
background: linear-gradient(90deg,#3b82f6,#60a5fa);
color:white;
font-weight:600;
font-size:14px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="card">

    <div class="title">Fn Corneas CV</div>

    <div class="field">
      <label>Pilih Exchange</label>
      <select id="exchange">
        <option value="">-- Pilih --</option>
        <option value="BINANCE">🔶 BINANCE</option>
        <option value="OKX">🔷 OKX</option>
        <option value="GATE IO">🔵 GATE IO</option>
        <option value="TOKOCRYPTO">🟢 TOKOCRYPTO</option>
        <option value="MEXC">💠 MEXC</option>
        <option value="BYBIT">🟡 BYBIT</option>
        <option value="BITGET">⚫ BITGET</option>
      </select>
    </div>

    <div class="field">
      <label>Nominal (USDT)</label>
      <input type="text" id="usdt" placeholder="Masukkan USDT">
    </div>

    <div class="result">
      <h2 id="hasil">Rp 0</h2>

      <div class="desc1">Terima Bersih Nominal Diatas</div>

      <div class="desc2">
        Silahkan Kirim <span class="usdt">USDT</span> ke UID Dibawah
      </div>

      <div class="desc3">
        Screenshot saat selesai kirim USDT setelah itu kirim screenshot + norek dengan cara klik tombol <b>Saya Sudah Transfer</b>
      </div>
    </div>

    <div class="uidbox">
      UID: <span id="uid">-</span><br>
      USN: FNOVA
    </div>

    <button id="btn">Saya Sudah Transfer</button>

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
