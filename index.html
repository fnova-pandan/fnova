<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FNovaa CV</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
    <h1>🌌 FNovaa CV</h1>
    <div class="pair"><span class="usdt">USDT</span> → IDR</div>

    <div class="card">

        <label>Pilih Exchange</label>
        <select id="exchange">
            <option value="">-- Pilih --</option>
            <option value="BINANCE">BINANCE</option>
            <option value="OKX">OKX</option>
            <option value="GATE IO">GATE IO</option>
        </select>

        <label>Nominal (<span class="usdt">USDT</span>)</label>
        <input id="usdt" type="number" placeholder="Contoh: 25">

        <div class="result red">IDR Kotor: <span id="kotor">0</span></div>
        <div class="result">Fee: <span id="fee">0</span></div>
        <div class="result green">IDR Bersih: <span id="bersih">0</span></div>

        <div class="box">
            <div>UID: <span id="uid">-</span></div>
            <div>USN: <span id="usn">-</span></div>
        </div>

        <button id="btn">Saya Sudah Transfer</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
