<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fnova Convert</title>

<style>

body {
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg,#2a004f,#000);
  padding:20px;
}

.card {
  background:#1e2d44;
  border-radius:25px;
  padding:20px;
  max-width:400px;
  margin:auto;
  box-shadow:0 0 25px rgba(255,255,0,0.2);
}

h1 {
  text-align:center;
  color:gold;
}

label {
  color:#ccc;
  display:block;
  margin-top:15px;
}

select, input {
  width:100%;
  padding:12px;
  border-radius:15px;
  border:2px solid gold;
  background:#2e3e56;
  color:white;
  margin-top:5px;
}

.result-box {
  background:#081a2f;
  border-radius:20px;
  padding:20px;
  text-align:center;
  margin-top:20px;
}

.result-box h2 {
  color:#00ff88;
  font-size:28px;
  margin-bottom:10px;
}

.calc-text {
  color:#ccc;
  font-size:14px;
  margin-bottom:10px;
}

.instruction {
  color:#eee;
  font-size:14px;
  margin:6px 0;
}

.uid-box {
  background:#000c22;
  padding:15px;
  border-radius:15px;
  text-align:center;
  margin-top:15px;
  color:white;
}

button {
  width:100%;
  margin-top:20px;
  padding:15px;
  background:gold;
  border:none;
  border-radius:20px;
  font-weight:bold;
  font-size:16px;
}

</style>
</head>

<body>

<div class="card">

<h1>💵 Fnovaa Convert</h1>

<label>Pilih Exchange</label>
<select id="exchangeSelect" onchange="updateResult()">
  <option value="">-- Pilih --</option>
  <option>Binance</option>
  <option>Tokocrypto</option>
  <option>OKX</option>
  <option>Gate.io</option>
  <option>MEXC</option>
</select>

<label>Nominal (USDT)</label>
<input type="number" id="usdtInput" placeholder="Masukkan USDT" oninput="updateResult()">

<div class="result-box">
  <h2>Rp <span id="idrTotal">0</span></h2>

  <p class="calc-text">
    Total = 
    <span id="usdtAmount">0</span> USDT × 16,600 
    - Fee (<span id="feeAmount">3.000</span>)
  </p>

  <p class="instruction">
    Silakan kirim <b><span id="usdtSend">0</span> USD</b> ke 
    <b><span id="exchangeName">EXCHANGE</span></b> di bawah ini.
  </p>

  <p class="instruction">
    Setelah transfer, screenshot bukti pembayaran dan pencet 
    <b>"Saya sudah transfer"</b> untuk konfirmasi
    (sekalian juga send payment).
  </p>
</div>

<div class="uid-box">
  UID: - <br>
  USN: FNOVA
</div>

<button>Saya Sudah Transfer</button>

</div>

<script>

let rate = 16600;
let fee = 3000;

function updateResult() {

  let usdt = document.getElementById("usdtInput").value || 0;
  let exchange = document.getElementById("exchangeSelect");

  let exchangeText = exchange.options[exchange.selectedIndex].text || "EXCHANGE";

  let total = (usdt * rate) - fee;

  document.getElementById("idrTotal").innerText =
    Number(total).toLocaleString("id-ID");

  document.getElementById("usdtAmount").innerText = usdt;
  document.getElementById("usdtSend").innerText = usdt;
  document.getElementById("feeAmount").innerText =
    fee.toLocaleString("id-ID");

  document.getElementById("exchangeName").innerText = exchangeText;
}

</script>

</body>
</html>
